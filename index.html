    <meta name="theme-color" content="#FBFBFA" />
    <script>
      (function () {
        try {
          var phase = localStorage.getItem("avg_io_theme_phase");
          if (phase !== "light" && phase !== "dark" && phase !== "auto") phase = null;
          if (!phase) {
            var leg = localStorage.getItem("avg_io_theme");
            if (leg === "dark") phase = "dark";
            else if (leg === "light") phase = "light";
            else phase = "auto";
          }
          var dark =
            phase === "auto"
              ? localStorage.getItem("avg_io_theme_last_computed") === "dark"
              : phase === "dark";
          if (dark) document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        } catch (e) {}
      })();
    </script>
